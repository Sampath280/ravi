# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - sampujari4

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # Backend Build and Deploy Steps
      - name: Build and Deploy Backend
        if: success()
        working-directory: my-backend
        run: |
          npm install
          npm run build --if-present
          npm run dev --if-present
          zip -r backend.zip ./*

      - name: Upload Backend Artifact
        if: success()
        uses: actions/upload-artifact@v2
        with:
          name: backend-app
          path: my-backend/backend.zip

      # Frontend Build and Deploy Steps
      - name: Build and Deploy Frontend
        if: success()
        working-directory: my-react-app
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
          zip -r frontend.zip ./*

      - name: Upload Frontend Artifact
        if: success()
        uses: actions/upload-artifact@v2
        with:
          name: frontend-app
          path: my-react-app/frontend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      # Backend Deployment
      - name: Download Backend Artifact
        uses: actions/download-artifact@v2
        with:
          name: backend-app

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'sampujari4'  # replace with your backend Azure App Service name
          slot-name: 'Production'  # optional, replace with your slot name if applicable
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_363ECD1EE41A4403B59709EFBD7BBEF2 }}  # Azure publish profile secret

      # Frontend Deployment
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v2
        with:
          name: frontend-app

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'sampujari4'  # replace with your frontend Azure App Service name
          slot-name: 'Production'  # optional, replace with your slot name if applicable
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_363ECD1EE41A4403B59709EFBD7BBEF2 }}  # Azure publish profile secret
