name: Build and deploy Node.js app to Azure Web App - certificate12245

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Build frontend
        run: |
          cd my-react-app
          npm install
          npm run build
        working-directory: ./my-react-app

      - name: Build backend
        run: |
          cd my-backend
          npm install
        working-directory: ./my-backend

      - name: Zip frontend artifact for deployment
        run: zip -r frontend.zip ./*
        working-directory: ./my-react-app/dist

      - name: Zip backend artifact for deployment
        run: zip -r backend.zip ./*
        working-directory: ./my-backend

      - name: Upload frontend artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: frontend-artifact
          path: my-react-app/dist/frontend.zip

      - name: Upload backend artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: backend-artifact
          path: my-backend/backend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download frontend artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: frontend-artifact

      - name: Download backend artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: backend-artifact

      - name: Unzip frontend artifact for deployment
        run: unzip frontend.zip -d ./frontend

      - name: Unzip backend artifact for deployment
        run: unzip backend.zip -d ./backend
      
      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'certificate12245'
          slot-name: 'Production'
          package: ./frontend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3CFF9D359FDC4E77877BC0BB0A635CCF }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'certificate12245'
          slot-name: 'Production'
          package: ./backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_3CFF9D359FDC4E77877BC0BB0A635CCF }}
