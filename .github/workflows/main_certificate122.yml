# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - certificate122

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Build frontend
        run: |
          cd my-react-app
          npm install
          npm run build
        working-directory: ./my-react-app

      - name: Build backend
        run: |
          cd backend
          npm install
          # Add any build steps for the backend if needed
        working-directory: ./backend
      
      - name: Upload frontend artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: frontend
          path: ./frontend/dist

      - name: Upload backend artifact for deployment job
        uses: actions/upload-artifact@v3
        with:
          name: backend
          path: ./backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download frontend artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: my-react-app
          path: ./my-react-app

      - name: Download backend artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: backend
          path: ./backend

      - name: 'Deploy frontend to Azure Web App'
        uses: azure/webapps-deploy@v2
        id: deploy-frontend
        with:
          app-name: 'certificate122'
          slot-name: 'Production'
          package: ./my-react-app
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}

      - name: 'Deploy backend to Azure Web App'
        uses: azure/webapps-deploy@v2
        id: deploy-backend
        with:
          app-name: 'certificate122'
          slot-name: 'Production'
          package: ./backend
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
